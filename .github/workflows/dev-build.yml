name: Publish Development Build

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: "10"

            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org/

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Deprecate previous dev version
              run: |
                  node --input-type=module << 'EOF'
                  import { readFile } from 'node:fs/promises';
                  import { execSync } from 'node:child_process';

                  try {
                    // const pkgJson = await readFile('./package/package.json', 'utf8');
                    // const { name: pkgName } = JSON.parse(pkgJson);
                    const pkgName = "guilds.js";

                    const stdout = execSync(
                      `pnpm view ${pkgName} versions --json`,
                      { encoding: 'utf8' }
                    );

                    await new Promise(resolve => setTimeout(resolve, 2500));
                    const versions = JSON.parse(stdout);

                    if (!versions || !stdout.trim()) {
                      console.log('No versions were found.');
                      process.exit(0);
                    }

                    const devVersions = versions
                      .filter(v => /^0\.0\.0-dev\.\d{12}$/.test(v))
                      .sort();

                    if (devVersions.length === 0) {
                      console.log('No development versions to deprecate.');
                      process.exit(0);
                    }

                    const currentVersion = process.env.NEW_VERSION;
                    const latestDevVersion = devVersions[devVersions.length - 1];
                    const deprecatedVersion =
                      latestDevVersion === currentVersion
                        ? devVersions[devVersions.length - 2]
                        : latestDevVersion;

                    if (!deprecatedVersion) {
                      console.log('No previous development version to deprecate.');
                      process.exit(0);
                    }

                    console.log(`Deprecating ${pkgName}@${deprecatedVersion}...`);
                    execSync(
                      `pnpm deprecate "${pkgName}@${deprecatedVersion}" "outdated dev build"`,
                      {
                        stdio: 'inherit',
                        env: {
                          ...process.env,
                          NODE_AUTH_TOKEN: process.env.NODE_AUTH_TOKEN,
                        },
                      }
                    );

                  } catch (error) {
                    console.error(`Error deprecating development version: ${error.message ?? error}`);
                    process.exit(1);
                  }

                  EOF
              env:
                  NEW_VERSION: ${{ env.DEV_VERSION }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Generate development version
              id: version
              run: |
                  DEV_VERSION="0.0.0-dev.$(date -u +%Y%m%d%H%M)"
                  echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV
                  echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_OUTPUT
                  node -e "
                    const fs = require('node:fs');
                    const pkgPath = './package/package.json';
                    const pkg = require(pkgPath);
                    pkg.version = '$DEV_VERSION';
                    fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2));
                  "

            - name: Publish package
              working-directory: package
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: pnpm publish --tag dev --access public --no-git-checks
