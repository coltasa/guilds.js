name: Publish Development Build

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: "10"

            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org/

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate development version
              id: version
              run: |
                  DEV_VERSION="$(node -e "console.log(require('./packages/guilds.js/package.json').version)")-dev.$(date -u +%Y%m%d%H%M)"
                  echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV
                  echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_OUTPUT

                  node -e "
                    const fs = require('node:fs');
                    const pkgPath = './packages/guilds.js/package.json';
                    const pkg = require(pkgPath);
                    pkg.version = '$DEV_VERSION';
                    fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
                  "

            - name: Deprecate previous dev version
              run: |
                  node --input-type=module << 'EOF'
                  import { readFile } from 'node:fs/promises'
                  import { execSync } from 'node:child_process'

                  try {
                    const pkgJson = await readFile('./packages/guilds.js/package.json', 'utf8')
                    const { name: pkgName, version: currentVersion } = JSON.parse(pkgJson)

                    const stdout = execSync(
                      `pnpm view ${pkgName} versions --json`,
                      { encoding: 'utf8' }
                    )

                    const versions = JSON.parse(stdout ?? "[]")
                    const devVersions = versions
                      .map((v) => {
                        const match = v.match(/^\d+\.\d+\.\d+-dev\.(\d{12})$/)

                        if (!match) {
                          return null
                        }

                        return { version: v, ts: Number(match[1]) }
                      })
                      .filter(Boolean)
                      .sort((a, b) => a.ts - b.ts)

                    if (devVersions.length < 1) {
                      console.log('No version to deprecate.')
                      process.exit(0)
                    }

                    const previous = devVersions.at(-1)?.version

                    if (!previous || previous === currentVersion) {
                      console.log('No version to deprecate.')
                      process.exit(0)
                    }

                    console.log(`Deprecating ${pkgName}@${previous}...`)

                    execSync(
                      `pnpm deprecate "${pkgName}@${previous}" "outdated dev build"`,
                      {
                        stdio: 'inherit',
                        env: {
                          ...process.env,
                          NODE_AUTH_TOKEN: process.env.NODE_AUTH_TOKEN
                        }
                      }
                    )

                  } catch (error) {
                    console.error(`Deprecation failed: ${error.message ?? error}`)
                    process.exit(1)
                  }

                  EOF
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish package
              working-directory: packages/guilds.js/
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: pnpm publish --tag dev --access public --no-git-checks
